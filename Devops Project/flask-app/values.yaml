
replicaCount: 1

image:
  repository: 957293614772.dkr.ecr.eu-west-1.amazonaws.com/project_ecr
  pullPolicy: Always
  tag: "Latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: true
  automount: true
  annotations: {}

  name: ""

podAnnotations: {}
#
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
 

service:
  type: LoadBalancer
  port: 5000
  targetPort: 5000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
  - name: gateway
    sectionName: http
  
  hostnames:
  - chart-example.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /headers
 

resources: {}
  

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []

volumeMounts: []
  

nodeSelector: {}

tolerations: []

affinity: {}
